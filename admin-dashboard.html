<!DOCTYPE html>
<html>
<head>
    <title>Boutique Admin - Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #232f3e; border-bottom: 2px solid #ffd814; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #232f3e; color: white; }
        
        .status-pill { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .low-stock { background: #fff3cd; color: #856404; }

        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007185; font-weight: bold; }
        .admin-controls { margin-bottom: 20px; text-align: right; max-width: 900px; margin: 0 auto 20px auto; }
    </style>
</head>
<body>

<div class="admin-controls">
    <button onclick="totalSystemReset()" style="background: #ff4444; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">
        <i class="fas fa-trash"></i> Empty Customer Database
    </button>
</div>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Shop</a>
    
    <h2><i class="fas fa-users"></i> Customer Database</h2>
    <div id="customer-list-container">
        <p>Loading customers...</p>
    </div>

    <br><br>

    <h2><i class="fas fa-boxes"></i> VISWAROOPINI Inventory</h2>
    <table>
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Price</th>
                <th>Stock Level</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Green Cotton Kurti</td>
                <td>₹2,500</td>
                <td>1 pcs</td>
                <td><span class="status-pill low-stock">Low Stock</span></td>
            </tr>
            <tr>
                <td>Cyan Cotton Kurti</td>
                <td>₹2,500</td>
                <td>1 pcs</td>
                <td><span class="status-pill low-stock">Low Stock</span></td>
            </tr>
            <tr>
                <td>Red Cotton Kurti</td>
                <td>₹2,500</td>
                <td>1 pcs</td>
                <td><span class="status-pill low-stock">Low Stock</span></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
// CLEANED UP FUNCTION
function displayCustomers() {
    // We use the exact key used in your signup page
    const data = JSON.parse(localStorage.getItem('viswaroopini_customer_db')) || [];
    const container = document.getElementById('customer-list-container');

    if (data.length === 0) {
        container.innerHTML = "<p style='color: #888;'>No customers have signed up yet.</p>";
        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>Email</th>
                    <th>Method</th>
                </tr>
            </thead>
            <tbody>`;

    data.forEach(user => {
        html += `
            <tr>
                <td>${user.name || 'N/A'}</td>
                <td>${user.phone || 'N/A'}</td>
                <td>${user.email || 'N/A'}</td>
                <td><small>${user.method || 'Manual'}</small></td>
            </tr>`;
    });

    html += "</tbody></table>";
    container.innerHTML = html;
}

function totalSystemReset() {
    if (confirm("This will delete ALL customers from your records. Proceed?")) {
        localStorage.removeItem('viswaroopini_customer_db');
        localStorage.removeItem('viswaroopini_active_user');
        alert("Database cleared.");
        location.reload();
    }
}

// Run exactly once when page loads
window.onload = displayCustomers;
</script>
</body>
</html>
